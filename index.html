<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boat GPS Tracker</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #e8f4ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        h1 {
            color: #0077cc;
        }

        button {
            background: #0077cc;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            background: #005fa3;
        }

        .info {
            margin-top: 20px;
            text-align: left;
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
        }

        .boat {
            margin-top: 10px;
            padding: 10px;
            background: #d9f0ff;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🚤 Boat GPS Tracker</h1>

    <button onclick="findLocation()">
        Find My Boat
    </button>

    <div class="info" id="location">
        Location not found yet.
    </div>

    <h3>Nearby Boats</h3>

    <div class="boat">
        🚤 Fishing Boat<br>
        Distance: Unknown
    </div>

    <div class="boat">
        🚤 Pontoon Boat<br>
        Distance: Unknown
    </div>

</div>


<script>

function findLocation() {

    const locationBox = document.getElementById("location");

    if (!navigator.geolocation) {
        locationBox.innerHTML =
        "GPS is not supported on this device.";
        return;
    }

    locationBox.innerHTML =
    "Finding location...";

    navigator.geolocation.getCurrentPosition(

        function(position) {

            let lat = position.coords.latitude;
            let lon = position.coords.longitude;
            let accuracy = position.coords.accuracy;

            locationBox.innerHTML = `
                <b>Your Boat Location:</b><br><br>
                Latitude: ${lat.toFixed(6)}<br>
                Longitude: ${lon.toFixed(6)}<br>
                Accuracy: ${accuracy.toFixed(1)} meters
            `;

        },

        function(error) {

            locationBox.innerHTML =
            "Location permission denied.";

        },

        {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        }

    );

}

</script>

</body>
</html>
